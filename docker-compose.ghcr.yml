# Sobreposicao para rodar as imagens JA PUBLICADAS pelo CI no GHCR,
# em vez de construir a partir do codigo-fonte local.
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d
#
# Util para: validar exatamente o artefato que o pipeline gerou e para
# rollback (basta apontar APP_VERSION para uma versao anterior).
#
# O atalho e o script: ./scripts/deploy.sh --ghcr [versao]

services:

  api:
    # !reset remove o "build" herdado: aqui a imagem vem pronta do registro.
    build: !reset null
    image: ghcr.io/pedrojeromel/solidarity-api:${APP_VERSION:-latest}

  worker:
    build: !reset null
    image: ghcr.io/pedrojeromel/solidarity-worker:${APP_VERSION:-latest}

  frontend:
    build: !reset null
    image: ghcr.io/pedrojeromel/solidarity-frontend:${APP_VERSION:-latest}
